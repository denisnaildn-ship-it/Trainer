<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Training Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;max-width:500px;margin:0 auto;padding:12px 16px 90px;color:#1a1a2e;line-height:1.5;background:#fff}
input,textarea,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
.header{text-align:center;margin-bottom:16px;padding-bottom:14px;border-bottom:3px solid #2d6a4f}
.header h1{font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:-0.5px}
.header p{font-size:12px;color:#888;margin-top:2px}
.week-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.wk-btn{width:52px;height:42px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#999;font-size:10px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.2}
.wk-btn .wnum{font-size:14px;font-weight:700}
.phase-badge{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;margin-bottom:8px}
.targets{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.target-box{padding:8px 10px;border-radius:6px;border-left:3px solid}
.target-box .label{font-size:10px;color:#888;font-weight:600}
.target-box .value{font-size:12px;font-weight:700}
.day-row{display:flex;gap:3px;margin-bottom:12px}
.day-cell{flex:1;border-radius:6px;border:1px solid #ddd;padding:6px 2px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.day-cell.active{border-width:2px}
.day-label{font-size:12px;font-weight:700}
.day-type-dot{font-size:7px;font-weight:600;padding:1px 4px;border-radius:3px;color:#fff}
.type-row{display:flex;gap:4px;margin-bottom:14px}
.type-btn{flex:1;padding:8px 4px;border-radius:6px;border:2px solid #ddd;background:#fff;color:#999;font-size:11px;font-weight:700;cursor:pointer;text-align:center}
.type-btn.active{color:#fff}
.section-title{font-size:12px;font-weight:800;margin-bottom:8px}
.ex-card{border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:3px solid #ddd}
.ex-card.dynamic{border-left-color:#e76f51}
.ex-card.warmup{background:#fde2e4;border-left-color:#c1121f;margin-bottom:5px}
.ex-card.rehab{background:#d8f3dc;border-left-color:#2d6a4f;margin-bottom:5px}
.ex-card.normal{background:#fafafa}
.ex-header{display:flex;justify-content:space-between;align-items:baseline}
.ex-name{font-size:13px;font-weight:700}
.ex-target{font-size:12px;font-weight:600}
.ex-note{font-size:11px;color:#888;margin-top:1px}
.last-weight{font-size:10px;color:#2d6a4f;font-weight:600;margin-top:2px;font-style:italic}
.sets-row{display:flex;gap:4px;margin-top:6px;overflow-x:auto;padding-bottom:2px}
.set-box{min-width:70px;flex:0 0 70px;background:rgba(255,255,255,0.7);border-radius:6px;padding:6px 6px 4px;text-align:center}
.set-box.no-kg{min-width:55px;flex:0 0 55px}
.set-label{font-size:10px;font-weight:700;color:#999;margin-bottom:4px}
.set-input{width:100%;padding:5px 4px;border:1px solid #ddd;border-radius:4px;font-size:13px;text-align:center;background:#fff;outline:none;color:#333}
.set-input+.set-input{margin-top:3px}
.note-input{width:100%;padding:5px 8px;border:1px solid #eee;border-radius:6px;font-size:11px;background:#f5f5f5;outline:none;color:#333;margin-top:6px}
.general-note{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;outline:none;color:#333;resize:vertical;min-height:40px;margin-top:8px}
.submit-btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;color:#fff}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid #eee;padding:8px 0;justify-content:center;gap:4px}
.nav-btn{padding:8px 20px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.feedback-card{border-radius:10px;padding:14px;border-left:3px solid;margin-bottom:12px}
.history-item{background:#fafafa;border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid;cursor:pointer}
.settings-card{background:#f8f8f8;border-radius:10px;padding:16px;margin-bottom:12px}
.toast{position:fixed;top:40px;left:50%;transform:translateX(-50%);background:#2d6a4f;color:#fff;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:700;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.2);text-align:center;max-width:90%}
.empty-day{text-align:center;padding:30px 20px;background:#fafafa;border-radius:10px;margin-top:8px}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" style="display:none" class="toast"></div>
<script>
var PLAN_START=new Date("2026-04-01");
var DN=["Mo","Di","Mi","Do","Fr","Sa","So"];
var FULL_DN=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
var TC={bench_high:"#e76f51",cardio:"#2d6a4f",bench_low:"#1d3557"};
var TL={bench_high:"Bench HIGH",cardio:"Cardio",bench_low:"Bench LOW"};

function getPhase(w){if(w<=5)return{name:"Hypertrophie",color:"#2d6a4f",bg:"#d8f3dc"};if(w===6||w===11)return{name:"Deload",color:"#7b2d8b",bg:"#f0e0f5"};if(w<=10)return{name:"Maximalkraft",color:"#774936",bg:"#f5e6d3"};return{name:"Testing",color:"#c1121f",bg:"#fde2e4"};}
function phaseKey(w){if(w<=5)return"hypertrophy";if(w===6||w===11)return"deload";if(w<=10)return"maxkraft";return"testing";}
function getKW(w){return w+13;}

var BENCH_INC={1:0,2:3,3:2,4:0,5:3,6:0,7:0,8:2,9:3,10:2,11:0,12:0};
var BENCH_BASE={1:67,2:70,3:72,4:72,5:75,6:45,7:80,8:82,9:85,10:87,11:50,12:100};

function getActualBench(week){
  for(var d=0;d<7;d++){
    ["bench_high","bench_low"].forEach(function(t){
      var k="w"+week+"_"+d+"_"+t;
      var dd=S.allData[k];
      if(dd&&dd.logs){["bench","bp","bd","bd2","bspd","t1rm"].forEach(function(eid){
        var ex=dd.logs[eid];if(ex){for(var s=0;s<10;s++){if(ex[s]&&ex[s].weight&&parseFloat(ex[s].weight)>0){getActualBench._r=parseFloat(ex[s].weight);}}}
      });}
    });
  }
  var r=getActualBench._r;getActualBench._r=null;return r;
}

function adaptBench(week){
  if(week===6)return"45kg x5 (3S)";if(week===11)return"50kg x5 (3S)";if(week===12)return"1RM TEST";
  if(week===1)return BENCH_BASE[1]+"kg x8 (4S)";
  var prev=week-1;if(prev===6)prev=5;if(prev===11)prev=10;
  getActualBench._r=null;getActualBench(prev);var actual=getActualBench._r;
  var inc=BENCH_INC[week]||2;
  if(actual){var n=actual+inc;if(week<=5)return n+"kg x8 (4S)";return n+"kg x"+(week<=8?"4":"3")+" (5S)";}
  var b=BENCH_BASE[week];if(week<=5)return b+"kg x8 (4S)";if(week<=10)return b+"kg x"+(week<=8?"4":"3")+" (5S)";return b+"kg";
}
function getPU(w){return{1:"4x max(6)",2:"4x max(7)",3:"4x max(7)",4:"4x max(7)",5:"4x max(8)",6:"3x4 easy",7:"+5kg x5(4S)",8:"+5kg x5(4S)",9:"+7.5kg x4(4S)",10:"+10kg x4(4S)",11:"3x5 BW",12:"MAX TEST"}[w];}

var WARMUP=[
  {id:"foam",name:"Foam Rolling BWS",target:"2 Min",sets:1,noKg:1},
  {id:"catcow",name:"Cat-Cow",target:"10 Wdh",sets:1,noKg:1},
  {id:"hang",name:"Dead Hang",target:"2x 20s",sets:2,noKg:1},
  {id:"bpa_w",name:"Band Pull-Aparts",target:"2x 15",sets:2,noKg:1},
  {id:"disc",name:"Band Dislocates",target:"2x 10",sets:2,noKg:1},
  {id:"scap",name:"Scapular Push-Ups",target:"2x 10",sets:2,noKg:1},
  {id:"warmbar",name:"Aufwaermsatz: Stange",target:"1x 15",sets:1,noKg:1},
  {id:"warm40",name:"Aufwaermsatz: 40%",target:"1x 10",sets:1,noKg:1},
  {id:"warm60",name:"Aufwaermsatz: 60%",target:"1x 5",sets:1,noKg:1},
];
var REHAB=[
  {id:"curlup",name:"McGill Curl-Up",target:"3x 10s Hold",sets:3,noKg:1},
  {id:"sidep",name:"Side Plank",target:"3x 15s/Seite",sets:3,noKg:1},
  {id:"bdog",name:"Bird Dog",target:"3x 8/Seite",sets:3,noKg:1},
  {id:"fp_r",name:"Banded Face Pulls",target:"3x 15",sets:3,noKg:1},
  {id:"ytw",name:"YTW Raises",target:"2x 8 je Pos.",sets:2,noKg:1},
];

function parseSets(target,dyn,week,pu){if(dyn){var t=pu?getPU(week):adaptBench(week);var m=t.match(/(\d+)S\)/);if(m)return parseInt(m[1]);var m2=t.match(/^(\d+)x/);if(m2)return parseInt(m2[1]);return 4;}var m=target.match(/^(\d+)x/);return m?parseInt(m[1]):3;}

var WO={
  hypertrophy:{
    bench_high:{title:"Bench Press HIGH",ex:[
      {id:"bench",name:"Bench Press",dyn:1,note:"Schulterblaetter zusammen, volle ROM bis Brust"},
      {id:"pullups",name:"Pull-Ups",dyn:1,pu:1,note:"3 Sek negativ, volle ROM",noKg:1},
      {id:"incline",name:"Incline DB Press",target:"3x 10",note:"30 Grad Winkel"},
      {id:"row",name:"Seated Cable Row",target:"3x 12",note:"Squeeze Rhomboide"},
      {id:"rdl",name:"DB Romanian Deadlift",target:"3x 10",note:"ACHTUNG: Bei LWS-Schmerz weglassen"},
      {id:"pallof",name:"Pallof Press",target:"3x 10/Seite",note:"Core Anti-Rotation"},
    ]},
    bench_low:{title:"Bench Press LOW",ex:[
      {id:"bp",name:"Bench Pause-Reps",target:"3x 6 @65%",note:"2s Pause auf Brust"},
      {id:"pu_neg",name:"Pull-Ups negativ",target:"4x 5",note:"3-5s runter",noKg:1},
      {id:"land",name:"Landmine Press",target:"3x 10/Arm",note:"Schulterfreundlich"},
      {id:"csrow",name:"Chest-Supported Row",target:"3x 12",note:"Kein LWS-Risiko"},
      {id:"goblet",name:"Goblet Squat",target:"3x 12",note:"LWS neutral"},
      {id:"dbug",name:"Dead Bug",target:"3x 8/Seite",note:"Core",noKg:1},
    ]},
    cardio:{title:"Cardio + Mobility",ex:[
      {id:"bike",name:"Cardio Bike Zone 2",target:"1x 25 Min",note:"HR 120-140",noKg:1},
      {id:"thor",name:"Thorakale Rotation",target:"3x 8/Seite",note:"Buch oeffnen",noKg:1},
      {id:"cars",name:"Shoulder CARs",target:"2x 5/Arm",note:"Langsam",noKg:1},
      {id:"hip",name:"Hip 90/90 Stretch",target:"2x 30s/Seite",note:"LWS entlasten",noKg:1},
      {id:"bfp",name:"Banded Face Pulls",target:"3x 20",note:"Rhomboide",noKg:1},
    ]}
  },
  maxkraft:{
    bench_high:{title:"Bench Press HIGH",ex:[
      {id:"bench",name:"Bench Press",dyn:1,note:"SCHWER - Safety Pins!"},
      {id:"wpu",name:"Weighted Pull-Ups",dyn:1,pu:1,note:"Gewichtsguertel"},
      {id:"cgb",name:"Close-Grip Bench",target:"3x 6 @75%",note:"Trizeps > Lockout"},
      {id:"bbr",name:"Barbell Row",target:"3x 6",note:"ACHTUNG: Ruecken neutral!"},
      {id:"bss",name:"Bulgarian Split Squat",target:"3x 8/Bein",note:"Unilateral"},
      {id:"abw",name:"Ab Wheel Knie",target:"3x 8",note:"Stopp bei LWS",noKg:1},
    ]},
    bench_low:{title:"Bench LOW (Speed)",ex:[
      {id:"bspd",name:"Bench Speed Reps",target:"6x 3 @60%",note:"EXPLOSIV"},
      {id:"pucl",name:"Pull-Up Cluster",target:"5x (2+2+2)",note:"15s Pause",noKg:1},
      {id:"dbb",name:"DB Bench Press",target:"3x 8",note:"Stabilitaet"},
      {id:"csr2",name:"Chest-Supported Row",target:"3x 8",note:""},
      {id:"lp",name:"Leg Press",target:"3x 10",note:"Ohne LWS"},
      {id:"pal2",name:"Pallof Press schwer",target:"3x 8/Seite",note:""},
    ]},
    cardio:{title:"Cardio Intervalle",ex:[
      {id:"intv",name:"Bike Intervalle",target:"1x 25 Min",note:"30s schnell / 90s easy",noKg:1},
      {id:"bpa2",name:"Band Pull-Aparts",target:"4x 20",note:"Rhomboide",noKg:1},
      {id:"exr",name:"External Rotation",target:"3x 15/Seite",note:"Rotatorenmanschette",noKg:1},
      {id:"bwsm",name:"BWS Mobilisation",target:"1x 10 Min",note:"Cat-Cow, Rotation",noKg:1},
    ]}
  },
  deload:{
    bench_high:{title:"Leichtes Training",ex:[
      {id:"bd",name:"Bench Press",dyn:1,note:"Nur Technik"},
      {id:"pud",name:"Pull-Ups",target:"3x 4 easy",note:"Locker",noKg:1},
      {id:"drd",name:"DB Row",target:"2x 10",note:"Leicht"},
      {id:"gsd",name:"Goblet Squat",target:"2x 10",note:""},
    ]},
    bench_low:{title:"Leichtes Training",ex:[
      {id:"bd2",name:"Bench Press",target:"3x 5 @50%",note:"Technik"},
      {id:"pud2",name:"Pull-Ups",target:"3x 4",note:"",noKg:1},
      {id:"fpd",name:"Face Pulls",target:"3x 15",note:"",noKg:1},
      {id:"dbd",name:"Dead Bug",target:"3x 8/Seite",note:"",noKg:1},
    ]},
    cardio:{title:"Mobility & Recovery",ex:[
      {id:"bkd",name:"Leichtes Radfahren",target:"1x 20 Min",note:"Zone 1",noKg:1},
      {id:"mobd",name:"Mobility-Routine",target:"1x 20 Min",note:"BWS, Schulter, Huefte",noKg:1},
      {id:"frd",name:"Foam Rolling",target:"1x 10 Min",note:"Ganzer Koerper",noKg:1},
    ]}
  },
  testing:{
    bench_high:{title:"TESTING DAY",ex:[
      {id:"t1rm",name:"Bench Press 1RM",target:"8x 1",note:"Stange bis 100kg, Spotter!"},
      {id:"tpu",name:"Pull-Up Max",target:"1x max",note:"Ziel: 10.",noKg:1},
    ]},
    bench_low:{title:"Retest",ex:[
      {id:"rt",name:"Optional Retest",target:"1x 1",note:""},
      {id:"ac",name:"Leichtes Accessory",target:"3x 10",note:""},
    ]},
    cardio:{title:"Restday",ex:[]}
  }
};

// Storage
function sv(k,v){try{localStorage.setItem("tt5_"+k,JSON.stringify(v));}catch(e){}}
function ld(k,d){try{var v=localStorage.getItem("tt5_"+k);return v?JSON.parse(v):d;}catch(e){return d;}}

// State
var S={
  screen:"train",week:1,dayIdx:0,selType:null, // selected workout type for current day
  logs:{},warmLogs:{},rehabLogs:{},note:"",feedback:"",
  loading:false,history:ld("hist",[]),apiKey:ld("key",""),showSettings:false,expandedHist:null,
  allData:ld("data",{}), // key: "w{week}_{dayIdx}_{type}"
  dayTypes:ld("dtypes",{}) // key: "w{week}_{dayIdx}" -> chosen type
};

function sKey(){return"w"+S.week+"_"+S.dayIdx+"_"+S.selType;}
function dtKey(){return"w"+S.week+"_"+S.dayIdx;}

function saveDayData(){
  if(!S.selType)return;
  S.allData[sKey()]={logs:S.logs,warmLogs:S.warmLogs,rehabLogs:S.rehabLogs,note:S.note,feedback:S.feedback};
  S.dayTypes[dtKey()]=S.selType;
  sv("data",S.allData);sv("dtypes",S.dayTypes);
}
function loadDayData(){
  S.selType=S.dayTypes[dtKey()]||null;
  if(S.selType){var d=S.allData[sKey()];if(d){S.logs=d.logs||{};S.warmLogs=d.warmLogs||{};S.rehabLogs=d.rehabLogs||{};S.note=d.note||"";S.feedback=d.feedback||"";return;}}
  S.logs={};S.warmLogs={};S.rehabLogs={};S.note="";S.feedback="";
}

function getLastWeight(exId){
  for(var w=S.week;w>=1;w--){for(var d=6;d>=0;d--){
    if(w===S.week&&d>=S.dayIdx)continue;
    ["bench_high","bench_low","cardio"].forEach(function(t){
      var dd=S.allData["w"+w+"_"+d+"_"+t];
      if(dd&&dd.logs&&dd.logs[exId]){for(var s=0;s<10;s++){if(dd.logs[exId][s]&&dd.logs[exId][s].weight){getLastWeight._r=dd.logs[exId][s].weight;}}}
    });
  }}
  var r=getLastWeight._r;getLastWeight._r=null;return r;
}

function countFB(w){var c=0;for(var d=0;d<7;d++){var t=S.dayTypes["w"+w+"_"+d];if(t){var dd=S.allData["w"+w+"_"+d+"_"+t];if(dd&&dd.feedback)c++;}}return c;}

function init(){
  var diff=Math.floor((new Date()-PLAN_START)/86400000);
  S.week=Math.min(12,Math.max(1,Math.floor(diff/7)+1));
  var jd=new Date().getDay();S.dayIdx=jd===0?6:jd-1;
  loadDayData();render();
}

function render(){
  var phase=getPhase(S.week);var pk=phaseKey(S.week);
  var h="";

  // Header
  h+='<div class="header" style="border-bottom-color:'+phase.color+'"><h1>Training Tracker</h1><p>Ziel: 100kg Bench / 10 Pull-Ups</p>';
  h+='<div style="margin-top:8px"><button onclick="toggleSettings()" style="background:none;border:1px solid #ddd;border-radius:6px;padding:4px 12px;font-size:11px;color:#888;cursor:pointer">'+(S.apiKey?'API Key gesetzt':'API Key eingeben')+'</button></div></div>';

  if(S.showSettings){
    h+='<div class="settings-card"><div style="font-size:14px;font-weight:700;margin-bottom:8px">Anthropic API Key</div>';
    h+='<input style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none;color:#333" type="password" placeholder="sk-ant-..." value="'+esc(S.apiKey)+'" oninput="S.apiKey=this.value">';
    h+='<div style="margin-top:8px"><button onclick="saveKey()" style="padding:10px 20px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;background:#2d6a4f;color:#fff">Speichern</button>';
    h+=' <button onclick="toggleSettings()" style="padding:10px 20px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;background:#eee;color:#333">Schliessen</button></div></div>';
  }

  if(S.screen==="train"){
    // Weeks
    h+='<div class="week-row">';
    for(var w=1;w<=12;w++){var p=getPhase(w);var act=S.week===w;var fb=countFB(w);var done=fb>=3;
      h+='<button class="wk-btn" style="border:'+(act?'2px solid '+p.color:'1px solid #ddd')+';background:'+(done?p.color:(act?p.bg:'#fff'))+';color:'+(done?'#fff':(act?p.color:'#999'))+'" onclick="setWeek('+w+')"><span class="wnum">'+w+'</span><span>KW'+getKW(w)+'</span>'+(fb>0&&!done?'<span style="font-size:8px">'+fb+'/3</span>':'')+(done?'<span style="font-size:9px">OK</span>':'')+'</button>';
    }
    h+='</div>';

    h+='<div class="phase-badge" style="background:'+phase.bg+';color:'+phase.color+'">KW'+getKW(S.week)+' - '+phase.name+'</div>';
    h+='<div class="targets"><div class="target-box" style="background:#f0f7f4;border-left-color:#2d6a4f"><div class="label">BENCH</div><div class="value" style="color:#2d6a4f">'+adaptBench(S.week)+'</div></div>';
    h+='<div class="target-box" style="background:#f0f4f7;border-left-color:#1d3557"><div class="label">PULL-UPS</div><div class="value" style="color:#1d3557">'+getPU(S.week)+'</div></div></div>';

    // Day slots Mo-So
    h+='<div class="day-row">';
    for(var d=0;d<7;d++){
      var act2=S.dayIdx===d;
      var dt=S.dayTypes["w"+S.week+"_"+d];
      var hasFB=dt&&S.allData["w"+S.week+"_"+d+"_"+dt]?.feedback;
      h+='<div class="day-cell'+(act2?' active':'')+'" style="border-color:'+(act2?phase.color:'#ddd')+';background:'+(act2?phase.bg:'#fff')+'" onclick="pickDay('+d+')">';
      h+='<div class="day-label" style="color:'+(act2?phase.color:'#333')+'">'+DN[d]+'</div>';
      if(dt){h+='<div class="day-type-dot" style="background:'+(TC[dt]||'#999')+'">'+TL[dt].split(" ")[0]+'</div>';}
      if(hasFB)h+='<div style="font-size:9px;color:#2d6a4f">&#10003;</div>';
      h+='</div>';
    }
    h+='</div>';

    // Type selector for selected day
    h+='<div style="font-size:12px;font-weight:700;margin-bottom:6px;color:#555">'+FULL_DN[S.dayIdx]+' - Was hast du trainiert?</div>';
    h+='<div class="type-row">';
    ["bench_high","cardio","bench_low"].forEach(function(t){
      var act3=S.selType===t;
      h+='<button class="type-btn'+(act3?' active':'')+'" style="'+(act3?'border-color:'+TC[t]+';background:'+TC[t]+';color:#fff':'border-color:#ddd')+'" onclick="pickType(\''+t+'\')">'+TL[t]+'</button>';
    });
    h+='</div>';

    // Training content
    if(!S.selType){
      h+='<div class="empty-day"><div style="font-size:14px;font-weight:600;color:#888">Waehle oben dein Training aus</div><div style="font-size:12px;color:#aaa;margin-top:4px">oder lass den Tag frei als Ruhetag</div></div>';
    } else {
      var wo=WO[pk]?.[S.selType];
      if(!wo||!wo.ex?.length){
        h+='<div class="empty-day"><div style="font-size:14px;color:#888">Ruhetag</div></div>';
      } else {
        var isStr=S.selType==="bench_high"||S.selType==="bench_low";

        if(isStr){
          h+='<div class="section-title" style="color:#c1121f">WARM-UP (PFLICHT)</div>';
          WARMUP.forEach(function(w){h+=renderCard(w,"warmup",w.sets,"warmLogs",w.noKg);});
          h+='<div style="height:12px"></div>';
        }

        h+='<div class="section-title" style="color:'+phase.color+'">TRAINING - '+wo.title+'</div>';
        wo.ex.forEach(function(ex){
          var n=parseSets(ex.target,ex.dyn,S.week,ex.pu);
          var target=ex.dyn?(ex.pu?getPU(S.week):adaptBench(S.week)):ex.target;
          h+=renderCard({id:ex.id,name:ex.name,target:target,note:ex.note,sets:n,noKg:ex.noKg},ex.dyn?"dynamic":"normal",n,"logs",ex.noKg);
        });

        if(isStr){
          h+='<div style="height:12px"></div><div class="section-title" style="color:#2d6a4f">REHAB BLOCK</div>';
          REHAB.forEach(function(r){h+=renderCard(r,"rehab",r.sets,"rehabLogs",r.noKg);});
        }

        h+='<textarea class="general-note" placeholder="Allgemeine Notizen..." oninput="S.note=this.value;saveDayData()">'+esc(S.note)+'</textarea>';

        if(S.feedback){
          h+='<div class="feedback-card" style="background:'+phase.bg+';border-left-color:'+phase.color+';margin-top:12px">';
          h+='<div style="font-size:12px;font-weight:800;color:'+phase.color+';margin-bottom:6px">COACHING FEEDBACK</div>';
          h+='<div style="font-size:13px;color:#333;white-space:pre-wrap;line-height:1.6">'+esc(S.feedback)+'</div></div>';
        }

        h+='<button class="submit-btn" style="background:'+phase.color+'" onclick="submitTraining()">'+(S.loading?'Laden...':'Training speichern + Feedback holen')+'</button>';
      }
    }

  } else if(S.screen==="feedback"){
    if(S.feedback){
      h+='<div class="feedback-card" style="background:'+phase.bg+';border-left-color:'+phase.color+'">';
      h+='<div style="font-size:12px;font-weight:800;color:'+phase.color+';margin-bottom:6px">FEEDBACK - '+FULL_DN[S.dayIdx]+' KW'+getKW(S.week)+'</div>';
      h+='<div style="font-size:13px;color:#333;white-space:pre-wrap;line-height:1.6">'+esc(S.feedback)+'</div></div>';
    } else {h+='<div style="text-align:center;padding:40px;color:#888">Noch kein Feedback.</div>';}
    h+='<button style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#333" onclick="go(\'train\')">Zurueck</button>';

  } else if(S.screen==="history"){
    h+='<div style="font-size:16px;font-weight:700;margin-bottom:12px">Trainings-History</div>';
    if(!S.history.length)h+='<div style="color:#888;font-size:13px">Noch keine Eintraege.</div>';
    S.history.slice().reverse().forEach(function(it,i){
      var p=getPhase(it.week);var op=S.expandedHist===i;
      h+='<div class="history-item" style="border-left-color:'+p.color+'" onclick="toggleHist('+i+')">';
      h+='<div style="display:flex;justify-content:space-between"><span style="font-size:12px;font-weight:700">KW'+getKW(it.week)+' '+it.day+'</span><span style="font-size:11px;color:#888">'+new Date(it.date).toLocaleDateString("de-DE")+'</span></div>';
      if(op){h+='<div style="font-size:11px;color:#666;white-space:pre-wrap;margin-top:8px;padding-top:8px;border-top:1px solid #eee">'+esc(it.summary)+'</div>';
        if(it.feedback)h+='<div style="font-size:11px;color:'+p.color+';margin-top:8px;white-space:pre-wrap;padding-top:8px;border-top:1px solid #eee">'+esc(it.feedback)+'</div>';}
      h+='</div>';
    });
  }

  // Nav
  h+='<div class="bottom-nav">';
  ["train","feedback","history"].forEach(function(s){var lb={train:"Training",feedback:"Feedback",history:"History"};var a=S.screen===s;
    h+='<button class="nav-btn" style="background:'+(a?phase.color:'#f5f5f5')+';color:'+(a?'#fff':'#888')+'" onclick="go(\''+s+'\')">'+lb[s]+'</button>';
  });h+='</div>';

  document.getElementById("app").innerHTML=h;
}

function renderCard(item,type,numSets,logKey,noKg){
  var cls="ex-card "+(type==="warmup"?"warmup":type==="rehab"?"rehab":type==="dynamic"?"normal dynamic":"normal");
  var tc=type==="warmup"?"#c1121f":type==="rehab"?"#2d6a4f":getPhase(S.week).color;
  var h='<div class="'+cls+'"><div class="ex-header"><span class="ex-name">'+esc(item.name)+'</span><span class="ex-target" style="color:'+tc+'">'+esc(item.target)+'</span></div>';
  if(item.note)h+='<div class="ex-note">'+esc(item.note)+'</div>';
  if(!noKg&&logKey==="logs"){getLastWeight._r=null;getLastWeight(item.id);var lw=getLastWeight._r;if(lw)h+='<div class="last-weight">Letztes Mal: '+lw+' kg</div>';}
  h+='<div class="sets-row">';
  for(var i=0;i<numSets;i++){var val=S[logKey]?.[item.id]?.[i]||{};
    h+='<div class="set-box'+(noKg?' no-kg':'')+'"><div class="set-label">Set '+(i+1)+'</div>';
    if(!noKg)h+='<input class="set-input" type="number" placeholder="kg" value="'+(val.weight||"")+'" onchange="setLog(\''+logKey+'\',\''+item.id+'\','+i+',\'weight\',this.value)">';
    h+='<input class="set-input" type="number" placeholder="reps" value="'+(val.reps||"")+'" onchange="setLog(\''+logKey+'\',\''+item.id+'\','+i+',\'reps\',this.value)"></div>';
  }
  h+='</div>';
  if(logKey==="logs"){var nv=S.logs?.[item.id]?.note||"";h+='<input class="note-input" placeholder="Notizen zur Uebung..." value="'+esc(nv)+'" oninput="setLog(\'logs\',\''+item.id+'\',\'note\',\'note\',this.value)">';}
  h+='</div>';return h;
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function go(s){S.screen=s;render();}
function setWeek(w){S.week=w;loadDayData();render();}
function pickDay(d){S.dayIdx=d;loadDayData();render();}
function pickType(t){
  if(S.selType===t){S.selType=null;S.logs={};S.warmLogs={};S.rehabLogs={};S.note="";S.feedback="";delete S.dayTypes[dtKey()];sv("dtypes",S.dayTypes);}
  else{S.selType=t;var d=S.allData[sKey()];if(d){S.logs=d.logs||{};S.warmLogs=d.warmLogs||{};S.rehabLogs=d.rehabLogs||{};S.note=d.note||"";S.feedback=d.feedback||"";}else{S.logs={};S.warmLogs={};S.rehabLogs={};S.note="";S.feedback="";}S.dayTypes[dtKey()]=t;sv("dtypes",S.dayTypes);}
  render();
}
function toggleSettings(){S.showSettings=!S.showSettings;render();}
function saveKey(){sv("key",S.apiKey);S.showSettings=false;showToast("API Key gespeichert!");render();}
function toggleHist(i){S.expandedHist=S.expandedHist===i?null:i;render();}
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.style.display="block";setTimeout(function(){t.style.display="none";},2500);}

function setLog(logKey,exId,setIdx,field,val){
  if(!S[logKey])S[logKey]={};if(!S[logKey][exId])S[logKey][exId]={};
  if(field==="note")S[logKey][exId].note=val;
  else{if(!S[logKey][exId][setIdx])S[logKey][exId][setIdx]={};S[logKey][exId][setIdx][field]=val;}
  saveDayData();
}

function buildSummary(){
  var phase=getPhase(S.week);var wo=WO[phaseKey(S.week)]?.[S.selType];
  var isStr=S.selType==="bench_high"||S.selType==="bench_low";
  var lines=["KW"+getKW(S.week)+" ("+phase.name+") - "+FULL_DN[S.dayIdx]+" - "+(wo?.title||"")];
  if(isStr){lines.push("\n--- WARM-UP ---");WARMUP.forEach(function(w){var s=S.warmLogs[w.id];if(!s){lines.push(w.name+": nicht gemacht");return;}var p=[];for(var i=0;i<w.sets;i++){if(s[i]?.reps)p.push("Set"+(i+1)+": "+s[i].reps);}lines.push(w.name+": "+(p.length?p.join(", "):"nicht eingetragen"));});}
  lines.push("\n--- TRAINING ---");
  if(wo?.ex)wo.ex.forEach(function(ex){var s=S.logs[ex.id];var n=parseSets(ex.target,ex.dyn,S.week,ex.pu);var p=[];if(s){for(var i=0;i<n;i++){if(s[i]?.reps)p.push("Set"+(i+1)+": "+(s[i].weight?s[i].weight+"kg x":"")+s[i].reps);}}if(s?.note)p.push("("+s.note+")");lines.push(ex.name+": "+(p.length?p.join(", "):"nicht gemacht"));});
  if(isStr){lines.push("\n--- REHAB ---");REHAB.forEach(function(r){var s=S.rehabLogs[r.id];if(!s){lines.push(r.name+": nicht gemacht");return;}var p=[];for(var i=0;i<r.sets;i++){if(s[i]?.reps)p.push("Set"+(i+1)+": "+s[i].reps);}lines.push(r.name+": "+(p.length?p.join(", "):"nicht eingetragen"));});}
  if(S.note)lines.push("\nNotizen: "+S.note);return lines.join("\n");
}

async function submitTraining(){
  if(!S.apiKey){alert("Bitte API Key eingeben");return;}
  S.loading=true;render();var summary=buildSummary();var phase=getPhase(S.week);
  var ctx="Du bist Denis' Kraft-Coach. Probleme: Bandscheibenvorfall (2J), Rhomboide-Schmerzen, Schulterschmerzen. Ziele: 100kg Bench (aktuell ca. 75kg x6), 10 Pull-Ups (aktuell 6). "+phase.name+", KW"+getKW(S.week)+".\n\nHeutiges Training:\n"+summary+"\n\nGib 4-5 Punkte Coaching-Feedback auf Deutsch. Was war gut, was muss besser, konkrete Anpassungen fuers naechste Training. Ehrlich, direkt, motivierend.";
  try{var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:ctx}]})});
    var data=await res.json();if(data.error)S.feedback="API Fehler: "+(data.error.message||JSON.stringify(data.error));else S.feedback=data.content?.map(function(b){return b.text||""}).join("\n")||"Kein Feedback.";
  }catch(e){S.feedback="Fehler: "+e.message;}
  saveDayData();S.history.push({date:new Date().toISOString(),week:S.week,day:FULL_DN[S.dayIdx],summary:summary,feedback:S.feedback});sv("hist",S.history);
  S.loading=false;showToast("Feedback erhalten!");render();
}

init();
</script>
</body>
